version: '3.8'
services:
  # This compose fragment prepares content-ms to trust a custom CA by mounting
  # a PEM file and setting NODE_EXTRA_CA_CERTS. Use with your main docker-compose
  # via `docker compose -f docker-compose.yml -f deploy/content-ms-ca-support.yml up -d`.
  content-ms:
    image: your-registry/content-ms:latest
    environment:
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/extra/custom-ca.pem
    volumes:
      - ./certs/custom-ca.pem:/etc/ssl/certs/extra/custom-ca.pem:ro
    # If you build locally instead of using an image, uncomment and set build:
    # build:
    #   context: ../path-to-content-ms
    #   dockerfile: Dockerfile
    #
    restart: always
    networks:
      - riff-network

networks:
  riff-network:
    external: true
